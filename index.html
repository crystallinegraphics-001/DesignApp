<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design Order App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Order Your Design 🎨</h1>

  <form id="orderForm">

    <label>Your Name:</label>
    <input type="text" id="name" required>

    <label>Your Contact:</label>
    <input type="text" id="contact" required>

    <label>Design Category:</label>
    <select id="type">
      <option>Flyer</option>
      <option>Poster</option>
      <option>Logo</option>
      <option>Album Cover</option>
      <option>Social Media Post</option>
      <option>Business Card</option>
      <option>Banner</option>
      <option>YouTube Thumbnail</option>
      <option>Packaging Design</option>
      <option>Brand Kit</option>
      <option>Invitation Card</option>
      <option>Menu Design</option>
      <option>T-Shirt Design</option>
      <option>Website UI</option>
      <option>Other (Custom Request)</option>
    </select>

    <label>Request Type:</label>
    <select id="requestType">
      <option>New Design</option>
      <option>Refine / Edit Existing Design</option>
    </select>

    <label>Description:</label>
    <textarea id="description" required></textarea>

    <label>Business Name / Title:</label>
    <input type="text" id="title">

    <label>Design Contact (on design):</label>
    <input type="text" id="designContact">

    <label>Upload Reference Images:</label>
    <input type="file" id="images" multiple>

    <button type="submit">Send Order 🚀</button>

  </form>

  <script src="script.js"></script>

</body>
</html>
