<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design App</title>

  <link rel="stylesheet" href="style.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body>

<h1>🎨 Place Your Order</h1>

<form onsubmit="placeOrder(); return false;">

  <label>Name</label>
  <input type="text" id="name" required>

  <label>Contact</label>
  <input type="text" id="contact" required>

  <label>Design Type</label>
  <select id="type">
    <option>Flyer</option>
    <option>Poster</option>
    <option>Logo</option>
    <option>Album Cover</option>
    <option>Other</option>
  </select>

  <label>Request Type</label>
  <select id="requestType">
    <option>New Design</option>
    <option>Edit Design</option>
  </select>

  <label>Title / Business</label>
  <input type="text" id="title">

  <label>Description</label>
  <textarea id="description"></textarea>

  <label>Design Contact</label>
  <input type="text" id="designContact">

  <button type="submit">Send Order 🚀</button>

</form>

<script src="script.js"></script>

</body>
</html>
